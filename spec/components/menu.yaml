component: menu
description: Pull-down or context menu — list of actions, optionally grouped by separators, with keyboard shortcuts on the trailing edge. Regular glass on macOS 26.
geometry:
  minWidth: 200
  maxWidth: 320
  radius: 12
  padding: 6
  itemMinHeight: 28
  itemPaddingX: 10
  itemPaddingY: 4
  itemRadius: 12
  itemGap: 2
  separatorHeight: 1
  shortcutGap: 24
  iconSize: 14
  iconGap: 8
typography:
  item: footnote
  shortcut: footnote
constraints:
  glass: regular
variants:
  - pull-down
  - context
  - submenu
states:
  - default
  - hover
  - pressed
  - disabled
  - destructive
