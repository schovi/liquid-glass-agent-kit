component: sheet
description: Modal bottom sheet that slides over content.
geometry:
  radius: 28        # top corners only
  padding: 24
  gap: 16
  grabberWidth: 36
  grabberHeight: 5
  backdropDim: "rgba(0,0,0,0.24)"
sizes:
  - compact     # ~33% viewport
  - medium      # ~50% viewport
  - large       # ~90% viewport
motion:
  enterDuration: 420
  enterEasing: spring
