component: text-field
description: Single-line text input. Solid surface — NOT glass — to keep text readable.
geometry:
  minHeight: 44
  paddingX: 12
  paddingY: 10
  radius: 12
  iconSize: 18
  iconGap: 8
typography:
  scale: body
constraints:
  glass: forbidden    # text fields should be solid; glass behind text reduces readability
