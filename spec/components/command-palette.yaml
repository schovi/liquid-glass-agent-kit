component: command-palette
description: |
  Floating Cmd-K surface — a single rounded glass panel above content with a
  search field, a filtered list of commands, and keyboard-first navigation.
  Apple's Spotlight is the original; Raycast / Linear / Superhuman are the
  modern app-level adaptations. The kit codifies the geometry, motion,
  material role, and keyboard model so amateurs ship a credible palette
  without reinventing focus management.
geometry:
  width: 640
  maxHeight: 480
  topOffset: 96            # distance from window top edge to palette top
  radius: 16               # md
  padding: 8
  inputHeight: 44
  itemHeight: 44
  itemRadius: 12           # sm — concentric with the 16 outer radius
  itemPadding: [12, 10]    # horizontal, vertical
  iconSize: 18
  shortcutHintSize: 12
  groupGap: 4
  sectionHeaderHeight: 28
material:
  role: hud                # solid scrim + Regular glass panel
  scrim:
    light: "rgba(0,0,0,0.08)"
    dark:  "rgba(0,0,0,0.32)"
keyboard:
  open: "Cmd+K"
  navigate: ["ArrowUp", "ArrowDown"]
  run: "Enter"
  close: "Escape"
  selectFirstOnFilter: true
motion:
  enter:
    duration: 240          # base
    easing: spring
    opacity: 0 -> 1
    scale: 0.96 -> 1
    translateY: -8 -> 0
  exit:
    duration: 160          # fast
    easing: standard
constraints:
  glass: required           # the panel itself is glass; items are solid hover rows
  glassOnGlass: forbidden   # do not place the palette over a glassy toolbar without the scrim
  forms: forbidden          # not for editing structured data; only for invoking commands
accessibility:
  focusTrap: true
  ariaRole: dialog          # the input has role=combobox + aria-activedescendant
  reducedMotion: collapse-to-fade
  reducedTransparency: solid-panel
