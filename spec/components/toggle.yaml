component: toggle
description: Boolean switch. System-rendered, used in forms and settings rows. Solid track, not glass. Label on the leading edge follows form-row spacing.
geometry:
  trackWidth: 38
  trackHeight: 22
  trackRadius: capsule
  knobSize: 18
  knobRadius: capsule
  knobInset: 2
  labelGap: 12
typography:
  label: subheadline
constraints:
  glass: forbidden
states:
  - off
  - on
  - mixed
  - disabled
motion:
  toggleDuration: 240
  toggleEasing: standard
