# Shape tokens. Apple's published shape rules:
#   - fixed:      explicit corner radius
#   - capsule:    radius = height / 2
#   - concentric: child radius = parent radius - inset (so curves align)

shape:
  fixed:
    sm: 12
    md: 16
    lg: 24
    xl: 28

  capsule:
    formula: "height / 2"

  concentric:
    formula: "parentRadius - inset"
