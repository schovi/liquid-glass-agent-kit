# Material approximation tokens for the three renderers.
#
# These are NOT Apple-published values. They are a community-derived web
# approximation chosen to look correct in HTML/CSS/SVG/WebGL across light
# and dark backgrounds. Renderers should consume only the values listed here.
#
# Two-axis model:
#   - `glass.*`     — the primitive material variants (regular, clear). What
#                     the surface *is*.
#   - `roles.*`     — semantic roles (sidebar, toolbar, menu, popover, hud,
#                     sheet, header, windowBackground, content). Where the
#                     surface *lives*. Picks the right Apple API per platform
#                     and decides whether the surface counts against the
#                     B1 live-blur budget.
# Renderers consume roles when they know the surface's role (almost always),
# and fall back to glass.* primitives when they don't.

glass:
  regular:
    css:
      background:
        light: "rgba(255,255,255,0.70)"
        dark:  "rgba(16,16,16,0.45)"
      backdropBlur: 40         # px
      saturation: 180          # %
      border:
        light: "rgba(255,255,255,0.18)"
        dark:  "rgba(255,255,255,0.12)"
      shadow: "0 8px 32px rgba(0,0,0,0.12)"
      highlight: "linear-gradient(135deg, rgba(255,255,255,0.40) 0%, transparent 55%)"

    svg:
      displacementScale: 70
      blurAmount: 0.0625
      saturation: 140          # %
      aberrationIntensity: 2
      elasticity: 0.15

    webgl:
      refraction: 0.06
      edgeDistance: 0.04
      rimIntensity: 0.025
      rimDistance: 0.12
      baseIntensity: 0.012
      baseDistance: 0.008
      cornerBoost: 0.02
      blur: 4                  # px
      chromaticAberration: 0.4
      tint: "#ffffff"
      tintOpacity: 0.06
      ambientTint: true
      specular: 0.6
      lightDirection: [0.5, -0.7]

  clear:
    css:
      background:
        light: "rgba(255,255,255,0.18)"
        dark:  "rgba(16,16,16,0.22)"
      backdropBlur: 28
      saturation: 160
      border:
        light: "rgba(255,255,255,0.22)"
        dark:  "rgba(255,255,255,0.16)"
      shadow: "0 6px 24px rgba(0,0,0,0.10)"
      requiresBackgroundDimming: true
      backgroundDim: "rgba(0,0,0,0.24)"

# Material roles — pick a role by where the surface lives, not by appearance.
#
# Each role names the closest real Apple API for SwiftUI, AppKit, and the
# macOS 26 / iOS 26 Glass variant where one applies. The `web:` field tells
# the web renderer which `glass.*` primitive to consume (or `solid` when the
# surface does not carry live blur). `liveBlur:` decides whether the surface
# counts against the B1 performance budget.
roles:
  sidebar:
    swiftui: "Glass.regular (NavigationSplitView sidebar column auto-applies)"
    appkit: "NSVisualEffectView.Material.sidebar"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  toolbar:
    swiftui: "Glass.regular (auto on .toolbar { ... })"
    appkit: "NSToolbar (unified mode) + NSVisualEffectView.Material.titlebar"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  menu:
    swiftui: "system-applied via Menu / .contextMenu"
    appkit: "NSVisualEffectView.Material.menu"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  popover:
    swiftui: "system-applied via .popover(isPresented:arrowEdge:)"
    appkit: "NSVisualEffectView.Material.popover"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  hud:
    swiftui: "Glass.regular inside .overlay(alignment:) (often in GlassEffectContainer)"
    appkit: "NSVisualEffectView.Material.hudWindow"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  sheet:
    swiftui: "system-applied via .sheet { ... .presentationDetents([...]) }"
    appkit: "NSWindow sheet (material .sheet)"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  header:
    swiftui: ".background(.regularMaterial) on sticky section headers"
    appkit: "NSVisualEffectView.Material.headerView"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  windowBackground:
    swiftui: "Color(nsColor: .windowBackgroundColor)"
    appkit: "NSVisualEffectView.Material.windowBackground (or solid)"
    glass26: "n/a — opaque tinted"
    web: solid
    liveBlur: false           # solid tint, cheap. Does not count against B1.

  content:
    swiftui: "Color(nsColor: .controlBackgroundColor)"
    appkit: "solid NSColor"
    glass26: "n/a — solid"
    web: solid
    liveBlur: false           # solid content surface. Does not count against B1.

# Performance / cognitive budget for live-blurred surfaces.
# See spec/rules/performance-budget.md for the full rule.
#
# A "surface" is one element with backdrop sampling (web: any .lg-glass;
# native: any non-.identity .glassEffect, NSGlassEffectView, or the
# contentView of a GlassEffectContainer / NSGlassEffectContainerView —
# the container itself counts as one).
budget:
  recommended: 3            # calm: typical app at rest (Mail, Notes, Finder)
  busyTransient: 5          # one popover or HUD is up
  max: 6                    # hard ceiling per top-level pane
  rationale: |
    JuniperPhoton measured three offscreen textures per CABackdropLayer
    and an iOS 26.1 regression where deep glass-on-glass drops rendering.
    Above 6 the experience is expensive (every blur costs a frame budget
    chunk) and fragile (regressions show first in the busiest screens).

# Accessibility fallbacks. Renderers MUST emit these alongside the material.
fallbacks:
  reducedTransparency:
    css:
      background:
        light: "rgba(255,255,255,0.92)"
        dark:  "rgba(20,20,20,0.92)"
      backdropBlur: 0
      saturation: 100
  increasedContrast:
    css:
      border:
        light: "rgba(0,0,0,0.45)"
        dark:  "rgba(255,255,255,0.55)"
  reducedMotion:
    description: Disable elasticity, displacement animation, parallax.
