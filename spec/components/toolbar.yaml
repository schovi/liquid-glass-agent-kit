component: toolbar
description: Horizontal floating group of icon-buttons. Capsule shape.
material:
  role: toolbar
geometry:
  minHeight: 52
  padding: 6
  gap: 4
  radius: capsule
  itemSize: 40
  itemIconSize: 20
placement:
  - top
  - bottom
  - floating
chrome:
  # When the toolbar sits inside the window titlebar (unified mode), the
  # surrounding window-chrome rules apply. See spec/patterns/window-chrome.md
  # for titlebar height, traffic-light alignment, and full-size content view.
  pattern: spec/patterns/window-chrome.md
