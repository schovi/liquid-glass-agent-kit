component: popover
description: Anchored floating panel. Regular glass with an optional arrow. Use for filters, quick info, contextual choices.
geometry:
  minWidth: 220
  maxWidth: 360
  radius: 16
  padding: 8
  itemMinHeight: 28
  itemPaddingX: 10
  itemPaddingY: 8
  itemRadius: 12
  itemGap: 2
  anchorOffset: 8
  arrowSize: 10
typography:
  item: footnote
constraints:
  glass: regular
  minWidthSafe: 200
motion:
  enterDuration: 240
  enterEasing: standard
placement:
  - top
  - bottom
  - leading
  - trailing
