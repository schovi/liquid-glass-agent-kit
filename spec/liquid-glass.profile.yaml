# Liquid Glass Web Profile — canonical source of truth.
#
# This file declares the portable web approximation profile that every
# adapter (Codex plugin, Claude plugin, copy/paste prompt, CLI, packages)
# is generated from. Do not hand-edit downstream copies.
#
# This is NOT an Apple-official spec. Apple's native Liquid Glass material
# is adaptive and platform-rendered; we approximate it for HTML/CSS/SVG/WebGL.
# Geometry tokens are intended to align with Apple's published UI kits;
# material tokens are community-derived approximations.

profile: liquid-glass-web
version: 0.1.0
status: apple-inspired-not-apple-official

sources:
  geometry: apple-ui-kit-extracted
  material: community-web-approximation
  rules: apple-human-interface-guidance

# Imports. Adapters read these in order and merge under the same top-level keys.
imports:
  - tokens/material.yaml
  - tokens/shape.yaml
  - tokens/spacing.yaml
  - tokens/typography.yaml
  - tokens/motion.yaml
  - components/button.yaml
  - components/icon-button.yaml
  - components/card.yaml
  - components/toolbar.yaml
  - components/tab-bar.yaml
  - components/sheet.yaml
  - components/segmented-control.yaml
  - components/text-field.yaml
  - components/popover.yaml
  - components/menu.yaml
  - components/search-field.yaml
  - components/toggle.yaml
  - components/slider.yaml
  - components/progress.yaml
  - components/badge.yaml

# Renderers an agent may pick from. Choice is part of the skill's required
# workflow; never silently mix two renderers in the same surface.
renderers:
  css:
    description: Backdrop-filter + saturate + tint. Broad compatibility, lowest fidelity.
    when: Default for production HTML targets and copy/paste output.
  css-svg:
    description: CSS backdrop + SVG feDisplacementMap for edge refraction.
    when: Better refraction without WebGL; works in Chromium and modern Safari.
  webgl:
    description: WebGL2 shader with background capture, refraction, specular.
    when: Highest fidelity. Only when the user accepts SSR/CORS/runtime cost.

# Material variants from Apple's published guidance.
variants:
  regular:
    description: Adaptive default. Use unless there is a strong reason to pick clear.
  clear:
    description: More transparent. Only with background dimming and safe contrast.

# Surface roles. Glass should live in the functional/navigation layer,
# not inside content.
surfaces:
  - navigation
  - toolbar
  - tab-bar
  - sheet
  - floating-panel
  - control
  - menu
