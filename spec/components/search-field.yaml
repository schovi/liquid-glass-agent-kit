component: search-field
description: Single-line search input. Solid surface — glass behind text reduces readability. In a toolbar takes capsule shape and tracks the toolbar item height (32). Inline takes radius 12 and tracks text-field height (44).
geometry:
  minHeightToolbar: 32
  minHeightInline: 44
  paddingX: 12
  paddingY: 6
  radiusToolbar: capsule
  radiusInline: 12
  iconSize: 14
  iconGap: 6
  clearButtonSize: 16
typography:
  scale: footnote
constraints:
  glass: forbidden
  alwaysAccessibleLabel: true
placements:
  - toolbar
  - inline
states:
  - default
  - focused
  - filled
  - disabled
