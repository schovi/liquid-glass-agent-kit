motion:
  duration:
    instant: 80      # ms
    fast: 160
    base: 240
    slow: 360
    sheet: 420

  easing:
    standard: "cubic-bezier(0.2, 0, 0, 1)"
    decelerate: "cubic-bezier(0, 0, 0, 1)"
    accelerate: "cubic-bezier(0.3, 0, 1, 1)"
    spring: "cubic-bezier(0.5, 1.6, 0.4, 0.85)"

  reducedMotion:
    description: Disable spring and decelerate easings, snap to base duration.
    duration: 0
    easing: "linear"
