component: slider
description: Continuous value control. Solid track with optional fill from a neutral value; thumb is a 22 pt circle. When the slider is placed in a toolbar context the system gives the thumb a glass treatment.
geometry:
  trackHeight: 4
  trackRadius: capsule
  thumbSize: 22
  thumbRadius: capsule
  tickHeight: 6
  minWidth: 120
  labelGap: 12
typography:
  label: subheadline
  value: footnote
constraints:
  glass: optional
states:
  - default
  - hover
  - dragging
  - disabled
variants:
  - linear
  - linear-with-neutral
  - linear-with-ticks
