component: progress
description: Determinate or indeterminate progress indicator. Solid surface — never glass. Two shapes — linear track and circular spinner — both follow the system rendering.
geometry:
  linearHeight: 4
  linearRadius: capsule
  linearMinWidth: 120
  circularSizeSmall: 16
  circularSizeMedium: 24
  circularSizeLarge: 32
  strokeWidth: 2
  labelGap: 8
typography:
  label: footnote
  value: caption1
constraints:
  glass: forbidden
variants:
  - linear-determinate
  - linear-indeterminate
  - circular-determinate
  - circular-indeterminate
states:
  - active
  - paused
  - complete
