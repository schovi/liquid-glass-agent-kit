# Material approximation tokens for the three renderers.
#
# These are NOT Apple-published values. They are a community-derived web
# approximation chosen to look correct in HTML/CSS/SVG/WebGL across light
# and dark backgrounds. Renderers should consume only the values listed here.
#
# Three-axis model:
#   - `glass.*`     — the primitive material variants (regular, clear). What
#                     the surface *is*. Each variant carries `css:` / `svg:`
#                     / `webgl:` knob sets — one per renderer tier that can
#                     consume the variant.
#   - `roles.*`     — semantic roles (sidebar, toolbar, menu, popover, hud,
#                     sheet, header, windowBackground, content). Where the
#                     surface *lives*. Picks the right Apple API per platform
#                     and decides whether the surface counts against the
#                     B1 live-blur budget.
#   - `tiers.*`     — graceful-degradation rendering ladder (T0–T3). How the
#                     surface is *drawn* on the web. A tier names a complete
#                     rendering strategy that consumes a subset of the
#                     glass.* primitive knobs. The prompt picks a tier from
#                     stated browser support; renderers honor `tierSelection`.
# Renderers consume roles when they know the surface's role (almost always),
# fall back to glass.* primitives when they don't, and always pick a tier.

glass:
  regular:
    css:
      background:
        light: "rgba(255,255,255,0.70)"
        dark:  "rgba(16,16,16,0.45)"
      backdropBlur: 40         # px
      saturation: 180          # %
      border:
        light: "rgba(255,255,255,0.18)"
        dark:  "rgba(255,255,255,0.12)"
      shadow: "0 8px 32px rgba(0,0,0,0.12)"
      highlight: "linear-gradient(135deg, rgba(255,255,255,0.40) 0%, transparent 55%)"

    svg:
      displacementScale: 70
      blurAmount: 0.0625
      saturation: 140          # %
      aberrationIntensity: 2
      elasticity: 0.15

    webgl:
      refraction: 0.06
      edgeDistance: 0.04
      rimIntensity: 0.025
      rimDistance: 0.12
      baseIntensity: 0.012
      baseDistance: 0.008
      cornerBoost: 0.02
      blur: 4                  # px
      chromaticAberration: 0.4
      tint: "#ffffff"
      tintOpacity: 0.06
      ambientTint: true
      specular: 0.6
      lightDirection: [0.5, -0.7]

  clear:
    css:
      background:
        light: "rgba(255,255,255,0.18)"
        dark:  "rgba(16,16,16,0.22)"
      backdropBlur: 28
      saturation: 160
      border:
        light: "rgba(255,255,255,0.22)"
        dark:  "rgba(255,255,255,0.16)"
      shadow: "0 6px 24px rgba(0,0,0,0.10)"
      requiresBackgroundDimming: true
      backgroundDim: "rgba(0,0,0,0.24)"

# Material roles — pick a role by where the surface lives, not by appearance.
#
# Each role names the closest real Apple API for SwiftUI, AppKit, and the
# macOS 26 / iOS 26 Glass variant where one applies. The `web:` field tells
# the web renderer which `glass.*` primitive to consume (or `solid` when the
# surface does not carry live blur). `liveBlur:` decides whether the surface
# counts against the B1 performance budget.
roles:
  sidebar:
    swiftui: "Glass.regular (NavigationSplitView sidebar column auto-applies)"
    appkit: "NSVisualEffectView.Material.sidebar"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  toolbar:
    swiftui: "Glass.regular (auto on .toolbar { ... })"
    appkit: "NSToolbar (unified mode) + NSVisualEffectView.Material.titlebar"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  menu:
    swiftui: "system-applied via Menu / .contextMenu"
    appkit: "NSVisualEffectView.Material.menu"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  popover:
    swiftui: "system-applied via .popover(isPresented:arrowEdge:)"
    appkit: "NSVisualEffectView.Material.popover"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  hud:
    swiftui: "Glass.regular inside .overlay(alignment:) (often in GlassEffectContainer)"
    appkit: "NSVisualEffectView.Material.hudWindow"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  sheet:
    swiftui: "system-applied via .sheet { ... .presentationDetents([...]) }"
    appkit: "NSWindow sheet (material .sheet)"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  header:
    swiftui: ".background(.regularMaterial) on sticky section headers"
    appkit: "NSVisualEffectView.Material.headerView"
    glass26: "regular"
    web: glass.regular
    liveBlur: true

  windowBackground:
    swiftui: "Color(nsColor: .windowBackgroundColor)"
    appkit: "NSVisualEffectView.Material.windowBackground (or solid)"
    glass26: "n/a — opaque tinted"
    web: solid
    liveBlur: false           # solid tint, cheap. Does not count against B1.

  content:
    swiftui: "Color(nsColor: .controlBackgroundColor)"
    appkit: "solid NSColor"
    glass26: "n/a — solid"
    web: solid
    liveBlur: false           # solid content surface. Does not count against B1.

# Performance / cognitive budget for live-blurred surfaces.
# See spec/rules/performance-budget.md for the full rule.
#
# A "surface" is one element with backdrop sampling (web: any .lg-glass;
# native: any non-.identity .glassEffect, NSGlassEffectView, or the
# contentView of a GlassEffectContainer / NSGlassEffectContainerView —
# the container itself counts as one).
budget:
  recommended: 3            # calm: typical app at rest (Mail, Notes, Finder)
  busyTransient: 5          # one popover or HUD is up
  max: 6                    # hard ceiling per top-level pane
  rationale: |
    JuniperPhoton measured three offscreen textures per CABackdropLayer
    and an iOS 26.1 regression where deep glass-on-glass drops rendering.
    Above 6 the experience is expensive (every blur costs a frame budget
    chunk) and fragile (regressions show first in the busiest screens).

# Renderer tiers — graceful-degradation ladder for the web profile.
# See spec/rules/web-renderer-tiers.md for the full rule and selection policy.
#
# A tier is a complete rendering strategy. Each tier names which primitives
# from glass.* / fallbacks.* it consumes, what browser feature gates it
# requires, and whether the auditor can verify it statically. The prompt
# selects a tier from stated browser support; the user-agent's accessibility
# preferences always override toward T0.
tiers:
  T0:
    label: "Solid tint + 1 px stroke (fallback)"
    description: |
      No backdrop sampling. Used when prefers-reduced-transparency is on,
      backdrop-filter is unsupported, or the author explicitly opts out
      of live-blurred glass. Always available; this is the floor.
    consumes: [fallbacks.reducedTransparency.css]
    requires: []
    auditable: true                  # A9 enforces the fallback exists in CSS
  T1:
    label: "backdrop-filter blur + saturate + tint (default)"
    description: |
      Current default. CSS backdrop-filter on the regular or clear
      primitive. Broadest cross-browser support among glass tiers
      (Safari 18+, Chrome / Edge 117+, Firefox 103+ with vendor prefix).
    consumes: [glass.regular.css, glass.clear.css]
    requires: ["backdrop-filter"]
    auditable: true                  # A3 covers off-token blur/saturation
  T2:
    label: "T1 + SVG feDisplacementMap edge refraction"
    description: |
      T1 plus an SVG filter that displaces backdrop pixels at the surface
      edge to suggest refraction. Chromium-class browsers render this
      acceptably; Safari's feDisplacementMap is too slow at the scale
      required and Firefox lacks `backdrop-filter: url(...)`. Renderers
      MUST gate T2 behind a Chromium check and fall to T1 otherwise.
    consumes: [glass.regular.css, glass.regular.svg, glass.clear.css]
    requires: ["backdrop-filter", "svg-displacement-map", "chromium"]
    auditable: false                 # opt-in; renderers self-attest
  T3:
    label: "WebGL backdrop sampling + chromatic dispersion + specular"
    description: |
      Real backdrop sampling via WebGL2. Highest fidelity (chromatic
      aberration, specular highlight, normal-based refraction) and
      highest cost — needs a render loop, same-origin or CORS access to
      the backdrop, and a fallback path when context is lost. Renderers
      MUST fall to T1 when WebGL2 is unavailable.
    consumes: [glass.regular.webgl]
    requires: ["webgl2", "render-loop"]
    auditable: false                 # opt-in; renderers self-attest

# Tier selection policy. Renderers and the web prompt MUST follow this order.
# The order is strict: accessibility preferences win, then explicit opt-ins,
# then the default.
tierSelection:
  default: T1
  policy:
    - "If prefers-reduced-transparency: reduce → force T0 regardless of opt-in."
    - "If backdrop-filter is unsupported by the runtime → fall to T0."
    - "If author opts into T3 and webgl2 + render loop are available → T3."
    - "If author opts into T2 and the user agent is Chromium-class → T2; otherwise fall to T1."
    - "Otherwise → T1 (the default)."
  markup:
    description: |
      Mark every glass element with the tier it's rendering at via
      `data-tier="T0|T1|T2|T3"`. Tier selection happens once at the
      page / app level (a `:root` class or a JS feature check that sets
      `data-tier` on every glass node). Renderers MUST NOT mix tiers
      inside one shared GlassEffectContainer-equivalent group.

# Accessibility fallbacks. Renderers MUST emit these alongside the material.
fallbacks:
  reducedTransparency:
    css:
      background:
        light: "rgba(255,255,255,0.92)"
        dark:  "rgba(20,20,20,0.92)"
      backdropBlur: 0
      saturation: 100
  increasedContrast:
    css:
      border:
        light: "rgba(0,0,0,0.45)"
        dark:  "rgba(255,255,255,0.55)"
  reducedMotion:
    description: Disable elasticity, displacement animation, parallax.
