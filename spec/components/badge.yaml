component: badge
description: Small solid status pill. Sits on content surfaces and the trailing edge of list rows — not on glass. Capsule shape, 20 tall.
geometry:
  minHeight: 20
  minWidth: 20
  paddingX: 8
  paddingY: 2
  radius: capsule
  iconSize: 12
  iconGap: 4
typography:
  scale: caption1
  weight: 600
constraints:
  glass: forbidden
variants:
  - neutral
  - info
  - success
  - warning
  - danger
  - counter
states:
  - default
